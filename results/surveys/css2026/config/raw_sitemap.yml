# ------------------------------------------------------------------------------------

# ------------------------------------------------------------------------------------
# Pages Properties
# - id: the unique (survey-wide) ID of the page
# - path: the page's path
# - children: the page's children pages
# - blocks: the page's blocks
# - pageTemplate: a template from which to inherit its properties (not used)
# - showTitle: whether to show the page title or not
# - variables: page variables (compiled during sitemap generation)

# Block Properties
# - id: the unique (survey-wide) ID of the block
# - blockName: the name of the block (used for titles, descriptions, etc.)
# - bucketKeysName: the name of the block's keys (used for legends, formatting data, etc.)
# - blockType: the type of block (which component to use)
# - query: the query used to populate the block's data
# - dataPath: the path to use (from the query root) to access the block's data
# - showLegend: whether to show the block's legend
# - showDescription: whether to show the block's description
# - template: a template from which to inherit its properties
# - translateData: whether to try and translate
# - variables: block variables (compiled during sitemap generation)

- id: overview
  path: /
  showTitle: false
  blocks:
      - id: survey_stats
        blockType: SurveyStatsBlock
        disableExport: true
        wrapBlock: false

      - id: survey_intro
        blockType: SurveyIntroBlock
        disableExport: true
        wrapBlock: false
        variables:
            showButton: false

      - id: overview.introduction.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: overview.1.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: favorite_new_features
        template: multiple_options2_freeform
        titleKey: usage.favorite_new_features
        questionKey: usage.favorite_new_features.question
        showAverage: true
        disableExport: true
        showInNav: false
        queryOptions:
            sectionId: usage

      - id: overview.2.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: css_interoperability_features
        template: multiple_options2_freeform
        titleKey: usage.css_interoperability_features
        questionKey: usage.css_interoperability_features.question
        showAverage: true
        disableExport: true
        showInNav: false
        queryOptions:
            sectionId: usage

      - id: overview.3.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: overview.4.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: css_ai_generated_code_balance
        template: multiple_options2
        titleKey: usage.css_ai_generated_code_balance
        questionKey: usage.css_ai_generated_code_balance.question
        showAverage: true
        disableExport: true
        showInNav: false
        queryOptions:
            sectionId: usage

      - id: overview.5.css2026
        blockType: TextBlock
        disableExport: true
        wrapBlock: false
        showInNav: false

      - id: full_survey_cta
        blockType: CTABlock
        wrapBlock: false
        showInNav: false
        variables:
            ctaKey: general.view_full_results
            ctaLink: /tshirt/

      - id: survey_sponsors
        template: sponsors

      - id: survey_partners
        template: sponsors
        blockType: PartnersBlock

