- id: features
  path: /features
  descriptionId: sections.features.description.css2026
  blocks:
      - template: page_introduction

      - id: figure_total_features
        template: figure
        variables:
            value: 46
            unit: count

      - id: all_features
        template: multi_items_experience
        i18nNamespace: features
        queryOptions:
            sectionId: _all_features
        chartOptions:
            limit: 5
            categories: [
                    layout,
                    shapes_graphics,
                    colors,
                    interactions,
                    # typography,
                    # accessibility,
                    # math_features,
                    other_features
                ]

      - id: figure_sibling_count_awareness
        template: figure
        variables:
            value: 22
            unit: percentage

      # - id: knowledge_score
      #   template: demographics
      - id: features_ratios_over_time
        template: multi_items_ratios
        queryOptions:
            sectionId: _all_features
        i18nNamespace: features
        variables:
            enableMultiSection: true

      # - id: josh_comeau
      #   template: picks
      #   variables:
      #       url: https://linear-easing-generator.netlify.app/

      - id: reading_list
        template: multiple_options2
        parameters:
            limit: 20
        queryOptions:
            sectionId: reading_list
            addQuestionComments: false
        chartOptions:
            dataFilters: [removeOverLimit, removeNoAnswer]
            limit: 10

      - id: features_resources
        items: [fm-css-grid, fm-animations-transitions]
        template: recommended_resources

