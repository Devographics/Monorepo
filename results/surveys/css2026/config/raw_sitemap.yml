- id: user_info
  titleId: sections.demographics.title
  path: /demographics
  blocks:
      - template: page_introduction

      - id: country
        template: multiple_options2
        parameters: { limit: 20 }
        variants:
            - template: vs_salary
              parameters: { cutoff: 100, limit: 20, sort: { property: medianByFacet, order: desc } }

      # - id: locale
      #   template: multiple_options2
      #   parameters: { cutoff: 20 }

      - id: hint_hint
        template: hint

      # - id: completion_stats
      #   template: multiple_options2

      - id: age
        template: multiple_options2
        variants:
            - template: vs_salary
              parameters:
                  sort: { property: options }

      - id: years_of_experience
        template: multiple_options2
        variants:
            - template: vs_salary
              parameters:
                  sort: { property: options }

      # - id: julia_miocene
      #   template: picks
      #   variables:
      #       url: https://developer.mozilla.org/en-US/docs/Web/API/View_Transition_API

      - id: company_size
        template: multiple_options2
        variants:
            - template: vs_salary
              parameters:
                  sort: { property: options }

      - id: variants_hint
        template: hint

      - id: yearly_salary
        template: multiple_options2
        variants:
            - id: yearly_salary_us_vs_world
              fieldId: yearly_salary
              tabId: tabs.usa_vs_the_world
              blockType: HorizontalBarBlock2
              hasData: true
              filtersState:
                  filters:
                      - conditions:
                            - fieldId: country
                              sectionId: user_info
                              operator: in
                              value: [USA]
                      - conditions:
                            - fieldId: country
                              sectionId: user_info
                              operator: nin
                              value: [USA]

      - id: job_title
        template: multiple_options2_freeform
        variants:
            - template: vs_salary
              parameters:
                  limit: 20
                  cutoff: 100
                  sort: { property: medianByFacet }
              chartOptions:
                  limit: 10
              queryOptions:
                  subField: freeform
            - template: vs_age
              parameters:
                  limit: 20
                  cutoff: 100
                  sort: { property: medianByFacet, order: asc }
              chartOptions:
                  limit: 10
              queryOptions:
                  subField: freeform
            - template: vs_years_of_experience
              parameters:
                  limit: 20
                  cutoff: 100
                  sort: { property: medianByFacet, order: asc }
              chartOptions:
                  limit: 10
              queryOptions:
                  subField: freeform
            - template: vs_gender
              parameters:
                  limit: 20
                  cutoff: 100
              chartOptions:
                  limit: 10
              queryOptions:
                  subField: freeform
              filtersState:
                  options:
                      mode: facet
                      sort: female
                      order: desc
                  facet:
                      sectionId: user_info
                      id: gender

      - id: frontend_masters_learning_path
        template: midpage_resource
        variables:
            id: fem-learning-path
            labelId: frontendmasters.learning_path
            imageUrl: https://assets.devographics.com/sponsors/fem-background-intermediate.jpg
            logoUrl: https://assets.devographics.com/sponsors/frontend-masters-dark.png
            link: https://frontendmasters.com/learn/professional/?utm_source=stateofdevs&utm_medium=website&utm_campaign=css2025

      - id: higher_education_degree
        template: multiple_options2
        variants:
            - template: vs_salary
              parameters:
                  sort: { property: options }

      # - id: lea_verou
      #   template: picks
      #   variables:
      #       url: https://developer.chrome.com/docs/css-ui/style-queries

      - id: gender
        template: multiple_options2
        variants:
            - template: vs_salary
            - id: country_vs_gender
              fieldId: country
              tabId: tabs.by_country
              template: multiple_options2
              parameters:
                  showNoAnswer: true
                  limit: 15
              filtersState:
                  options:
                      mode: facet
                      sort: female
                      order: desc
                  facet:
                      sectionId: user_info
                      id: gender

      - id: race_ethnicity
        template: multiple_options2_combined
        variants:
            - template: vs_years_of_experience
            - template: vs_age

      - id: disability_status
        template: multiple_options2_combined

      - id: user_info_resources
        items: [fm-homepage]
        template: recommended_resources

- id: awards
  path: /awards
  blocks:
      - template: page_introduction

      - id: awards
        template: awards
        variables:
            entities: '"has_selector","aspect_ratio","css_nesting","css_gap_decorations","if_function","scroll_state","sibling_index","sibling_count","at_function","anchor_positioning","viewport_percentage_length_units","at_container_size","aspect_ratio","wide_gamut_colors","css_carousels","gradient_color_spaces","subgrid","css_nesting"'
        awards:
            - id: most_used_feature_award
              template: award
              awards:
                  - id: has_selector
                    value: '83.7%'
                  - id: aspect_ratio
                    value: '81.3%'
                  - id: css_nesting
                    value: '70.6%'

            - id: least_used_feature_award
              template: award
              awards:
                  - id: css_gap_decorations
                    value: '3.7%'
                  - id: if_function
                    value: '4.9%'
                  - id: scroll_state
                    value: '5.5%'

            - id: largest_awareness_progression_award
              template: award
              awards:
                  - id: sibling_index
                    value: '23%'
                  - id: sibling_count
                    value: '23%'
                  - id: at_function
                    value: '22%'

            - id: largest_usage_progression_award
              template: award
              awards:
                  - id: anchor_positioning
                    value: '15%'
                  - id: viewport_percentage_length_units
                    value: '11%'
                  - id: at_container_size
                    value: '11%'

            - id: most_loved_feature_award
              template: award
              awards:
                  - id: has_selector
                    value: '51.8%'
                  - id: css_nesting
                    value: '48.6%'
                  - id: aspect_ratio
                    value: '48.1%'

            - id: most_hated_feature_award
              template: award
              awards:
                  - id: wide_gamut_colors
                    value: '7.9%'
                  - id: css_carousels
                    value: '6.6%'
                  - id: gradient_color_spaces
                    value: '5.6%'

            - id: most_commented_feature_award
              template: award
              awards:
                  - id: subgrid
                    value: 78
                  - id: css_nesting
                    value: 63
                  - id: anchor_positioning
                    value: 58

